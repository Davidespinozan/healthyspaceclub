const app=document.getElementById('app');
const groups={};DATA.forEach(d=>{(groups[d.t]=groups[d.t]||[]).push(d)});
const order=['Desayuno','Comida','Cena','Snack'];
let missing=0;
app.innerHTML=order.filter(t=>groups[t]).map(t=>
 `<h2>${t} · ${groups[t].length}</h2><div class="grid">`+groups[t].map((d,i)=>{
  const pend=d.pend.length?`<span class="badge">pendiente: ${d.pend.join(', ')}</span>`:'';
  return `<div class="card" data-t="${d.t}" data-pend="${d.pend.length?1:0}" data-txt="${(d.n+' '+d.ings.join(' ')).toLowerCase()}">
   <div class="imgwrap"><img src="${BUCKET}${d.img}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';this.closest('.card').dataset.nofoto=1;mark()"/>
     <div class="nofoto"><span>sin foto</span><span style="font-weight:600;font-size:10px">${d.img}</span></div></div>
   <div class="meta"><div class="name">${d.n}</div>
    <div class="macros"><span class="kcal"><span class="lbl">kcal</span><b>${d.kcal}</b></span>
     <span class="pp"><span class="lbl">P</span><b>${d.p}</b></span>
     <span class="gg"><span class="lbl">G</span><b>${d.g}</b></span>
     <span class="cc"><span class="lbl">C</span><b>${d.c}</b></span></div>
    ${pend}<div class="ings">${d.ings.join(' · ')}</div></div></div>`;
 }).join('')+`</div>`).join('');
function mark(){missing++;upd()}
function upd(){document.getElementById('stats').textContent=`${DATA.length} platillos · ${DATA.filter(d=>d.pend.length).length} con alimento pendiente · ${missing} sin foto detectadas`}
upd();
let filter='all',q='';
function apply(){document.querySelectorAll('.card').forEach(c=>{
  const mf=filter==='all'||(filter==='nofoto'?c.dataset.nofoto==='1':filter==='pend'?c.dataset.pend==='1':c.dataset.t===filter);
  const mq=!q||c.dataset.txt.includes(q);c.classList.toggle('hidden',!(mf&&mq));});
 document.querySelectorAll('h2,.grid').forEach(el=>{if(el.classList.contains('grid'))el.classList.toggle('hidden',!el.querySelector('.card:not(.hidden)'))});}
document.getElementById('q').oninput=e=>{q=e.target.value.trim().toLowerCase();apply()};
document.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));p.classList.add('on');filter=p.dataset.f;apply()});
</script></body></html>
