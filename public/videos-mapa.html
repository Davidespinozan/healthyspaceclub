<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mapa de videos — HSC</title>
<style>
:root{--bg:#F2F0E8;--ink:#0E2521;--ok:#2E7D57;--warn:#C77A2A;--miss:#B4453C;--line:rgba(21,51,48,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,sans-serif;padding:18px 14px 60px}
header,.tools,.grid,h2{max-width:1240px;margin-left:auto;margin-right:auto}
h1{font-size:22px;font-weight:800}
.sub{color:rgba(21,51,48,.6);font-size:13px;margin-top:4px;line-height:1.5}
.tools{margin:16px auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input[type=search]{flex:1;min-width:220px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff}
.pill{padding:7px 13px;border-radius:999px;font-size:13px;font-weight:700;border:1px solid var(--line);background:#fff;cursor:pointer;user-select:none}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
h2{margin:26px auto 10px;font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:rgba(21,51,48,.65)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden}
.card.miss{border-style:dashed;border-color:rgba(180,69,60,.45);background:#FCF7F6}
.card video{width:100%;aspect-ratio:1/1;object-fit:cover;background:#000;display:block}
.ph{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:#F6EFEE;color:var(--miss);font-weight:800;font-size:13px;letter-spacing:.04em}
.meta{padding:11px 13px}
.pat{font-size:14px;font-weight:800;line-height:1.25}
.vn{font-size:13px;color:rgba(21,51,48,.7);margin-top:2px}
.id{font-family:ui-monospace,monospace;font-size:11px;color:rgba(21,51,48,.5);margin-top:6px;word-break:break-all}
.tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px}
.t-ok{background:#E4F0EA;color:var(--ok)} .t-warn{background:#F7EDE0;color:var(--warn)}
.t-miss{background:#F6E5E3;color:var(--miss)} .t-eq{background:#EDEFEE;color:#55605b}
.hidden{display:none}
</style></head><body>
<header>

  </div>
</header>

  <span class="pill" data-f="propio">Con video propio</span>

</div>

let filter='all', q='';
const app=document.getElementById('app');
function render(){
  const groups={};
  for(const r of ROWS){
    if(filter==='miss' && r.via!=='') continue;
    if(filter==='patron' && r.via!=='patron') continue;
    if(filter==='propio' && r.via!=='propio') continue;
    if(filter==='YOGA' && r.grp!=='YOGA') continue;
    if(q){ const s=(r.pat+' '+r.vname+' '+r.id).toLowerCase(); if(!s.includes(q)) continue; }
    (groups[r.grp]=groups[r.grp]||[]).push(r);
  }
  app.innerHTML = Object.keys(groups).sort().map(g=>{
    const cards=groups[g].map(r=>{
      const media = r.vids.length
        ? '<video src="'+r.vids[0]+'" controls preload="metadata" playsinline></video>'
        : '<div class="ph">SIN VIDEO</div>';
      const tag = r.via==='propio' ? '<span class="tag t-ok">video propio</span>'

                : '<span class="tag t-miss">falta grabar</span>';
      return '<div class="card'+(r.vids.length?'':' miss')+'">'+media+
        '<div class="meta"><div class="pat">'+r.pat+'</div>'+
        (r.vname!=='—'?'<div class="vn">'+r.vname+'</div>':'')+
        '<div class="id">'+r.id+'</div>'+
        '<div class="tags">'+tag+'<span class="tag t-eq">'+(r.eq||'—')+'</span></div>'+
        '</div></div>';
    }).join('');
    return '<h2>'+g+' <span style="font-weight:400;opacity:.5">('+groups[g].length+')</span></h2><div class="grid">'+cards+'</div>';
  }).join('') || '<p style="max-width:1240px;margin:40px auto;text-align:center;opacity:.5">Sin resultados.</p>';
}
