<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSC — Calculadora</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;-webkit-tap-highlight-color:transparent}
:root{
 --forest:#0E2521;--moss:#1C3B35;--sage:#3d6359;--green:#4e9d8f;
 --amber:#BFA065;--amber-deep:#7C6232;--terra:#A8864E;
 --bg:#FAFAF7;--surface:#fff;--warm:#F0EBE0;--sand:#E8E1D3;--sky:#EDE9E0;
 --border:rgba(46,74,66,.12);--bdr:rgba(46,74,66,.09);
 --txt:#0E2521;--txt2:rgba(21,51,48,.58);--muted:rgba(21,51,48,.5);--taupe:#8a8270;--taupe-deep:#6b6359;
 --terracota:#C75B3A;
 --grad-amber:linear-gradient(135deg,#C9A968,#A8864E);
 --shadow-sm:0 2px 4px rgba(21,51,48,.04);--shadow-md:0 8px 16px rgba(21,51,48,.06);
 --shadow-lg:0 12px 24px rgba(21,51,48,.06);--glow-amber:0 10px 24px rgba(168,134,78,.32);
 --r:18px;--ease:cubic-bezier(0.22,1,0.36,1);
}
body{background:var(--bg);color:var(--txt);min-height:100vh;padding:0 0 50px}
.wrap{max-width:440px;margin:0 auto;padding:0 18px}
.top{padding:26px 0 16px;text-align:center}
.top .logo{font-size:10px;font-weight:700;letter-spacing:.22em;color:var(--amber);text-transform:uppercase}
.top h1{font-weight:600;font-size:24px;margin-top:6px;letter-spacing:-.02em;color:var(--forest)}
.top h1 em{font-style:italic;color:var(--amber);font-weight:600}
.modeswitch{display:flex;gap:6px;background:var(--warm);border-radius:50px;padding:5px;margin:16px 0 20px}
.modeswitch button{flex:1;border:none;background:transparent;color:var(--taupe-deep);padding:11px;border-radius:50px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.2s}
.modeswitch button.on{background:var(--surface);color:var(--forest);box-shadow:var(--shadow-sm)}
/* hero oscuro con la meta */
.goalcard{background:radial-gradient(120% 90% at 12% 0%, #1d3c36 0%, transparent 55%),#0d1f1c;border-radius:22px;padding:18px 20px 12px;position:sticky;top:8px;z-index:5;box-shadow:0 12px 30px rgba(8,20,27,.22)}
.goalcard .lbl{font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--amber);text-transform:uppercase;margin-bottom:12px}
.kcalrow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.kcalrow .big{font-size:32px;font-weight:600;letter-spacing:-.03em;color:#fff}
.kcalrow .big small{font-size:14px;font-weight:400;color:rgba(246,242,234,.55)}
.kcalrow .goal{font-size:12px;color:rgba(246,242,234,.62);font-style:italic}
.bar{margin-bottom:11px}
.bar .brow{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.bar .brow .nm{font-weight:500;color:rgba(246,242,234,.9)}.bar .brow .vl{color:rgba(246,242,234,.55)}
.track{height:5px;background:rgba(246,242,234,.15);border-radius:10px;overflow:hidden}
.fill{height:100%;border-radius:10px;transition:width .4s var(--ease);width:0;background:var(--grad-amber)}
.meal{margin-top:14px;background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--shadow-md);overflow:hidden}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 13px}
.mhead .mt{display:flex;align-items:center;gap:10px}
.mhead .ico{width:34px;height:34px;border-radius:10px;background:var(--warm);display:flex;align-items:center;justify-content:center;color:var(--forest)}
.mhead .nm{font-size:14.5px;font-weight:700;color:var(--forest)}
.mhead .sub{font-size:13px;font-weight:700;color:var(--amber-deep)}.mhead .sub small{color:var(--taupe);font-weight:400;font-size:11px}
.mitems{padding:0 18px}
.mi{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--bdr)}
.mi .info{flex:1;cursor:pointer}.mi .info .n{font-size:13px;font-weight:600;color:var(--forest)}
.mi .info .n .tag{font-size:8.5px;background:var(--grad-amber);color:#fff;padding:2px 7px;border-radius:50px;margin-left:7px;vertical-align:middle;letter-spacing:.5px;font-weight:700}
.mi .info .m{font-size:11px;color:var(--txt2);margin-top:2px}
.mi .kc{font-size:13px;font-weight:700;color:var(--amber-deep)}
.mi .del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;padding:0 2px}
.subing{padding:3px 0 3px 12px;font-size:10.5px;color:var(--txt2);border-left:2px solid var(--sand);margin:3px 0 3px 2px}
.addrow{display:flex;gap:8px;padding:13px 18px 16px}
.addbtn2{flex:1;background:var(--surface);border:1px solid var(--sand);color:var(--forest);padding:11px;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.addbtn2:hover{border-color:var(--amber)}
.modal{position:fixed;inset:0;background:rgba(13,31,28,.4);display:none;align-items:flex-end;justify-content:center;z-index:20;backdrop-filter:blur(2px)}
.modal.show{display:flex}
.sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-width:440px;padding:22px 20px 28px;animation:up .28s var(--ease);max-height:90vh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.stitle{font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--amber);text-transform:uppercase;margin-bottom:14px}
.search input,.nameinput{width:100%;background:var(--warm);border:1px solid transparent;border-radius:14px;padding:14px 16px;color:var(--forest);font-size:15px;outline:none;transition:.15s}
.search input::placeholder,.nameinput::placeholder{color:rgba(21,51,48,.4);font-style:italic}
.search input:focus,.nameinput:focus{border-color:var(--amber);background:#fff}
.results{margin-top:10px;max-height:320px;overflow-y:auto}
.ritem{padding:13px 4px;border-bottom:1px solid var(--bdr);cursor:pointer}
.ritem .nm{font-size:14px;font-weight:600;color:var(--forest)}
.ritem .nm .tag{font-size:8.5px;background:var(--grad-amber);color:#fff;padding:2px 7px;border-radius:50px;margin-left:7px;letter-spacing:.5px;font-weight:700}
.ritem .mt{font-size:11px;color:var(--txt2);margin-top:2px}
.sheet h2{font-size:20px;font-weight:600;letter-spacing:-.015em;color:var(--forest);margin-bottom:3px}
.sheet .grp{font-size:12px;color:var(--txt2);margin-bottom:22px;font-style:italic}
.qstepper{display:flex;align-items:center;gap:14px;margin-bottom:18px;justify-content:center}
.qbtn{width:54px;height:54px;border-radius:50%;background:var(--surface);border:1.5px solid var(--sand);color:var(--forest);font-size:26px;cursor:pointer;line-height:1;transition:.15s;box-shadow:var(--shadow-sm)}
.qbtn:hover{border-color:var(--amber)}.qbtn:active{transform:scale(.94)}
.qdisp{flex:1;text-align:center;font-size:28px;font-weight:600;letter-spacing:-.03em;color:var(--forest);min-width:90px}.qdisp small{font-size:14px;color:var(--taupe);font-weight:400}
.unitsel{display:flex;gap:8px;margin-bottom:22px}
.unitsel button{flex:1;background:var(--surface);border:1px solid var(--sand);color:var(--forest);padding:12px;border-radius:50px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
.unitsel button.on{background:var(--grad-amber);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(168,134,78,.28)}
.preview{background:linear-gradient(180deg,#fff,#faf6ef);border:1px solid var(--sand);border-radius:16px;padding:15px 18px;margin-bottom:20px;display:flex;justify-content:space-between;box-shadow:var(--shadow-sm)}
.preview .pk{font-weight:700;font-size:19px;color:var(--amber-deep)}
.preview .macros{color:var(--txt2);text-align:right;font-size:13px;line-height:1.5}
.addbtn{width:100%;padding:15px;background:var(--forest);color:#fff;border:none;border-radius:50px;font-size:13.5px;font-weight:700;letter-spacing:.02em;cursor:pointer;transition:background .15s}
.addbtn:hover{background:var(--moss)}.addbtn:active{transform:scale(.99)}.addbtn:disabled{opacity:.35}
.cancel{width:100%;background:none;border:none;color:var(--taupe);padding:13px;margin-top:6px;font-size:13px;cursor:pointer}
.plings{margin:16px 0}
.pling{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.pling .info{flex:1}.pling .info .n{font-size:13px;font-weight:600;color:var(--forest)}.pling .info .m{font-size:11px;color:var(--txt2);margin-top:1px}
.pling .kc{font-size:13px;font-weight:700;color:var(--amber-deep)}
.pling .del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px}
.plempty{text-align:center;color:var(--txt2);font-size:12px;padding:18px 0;line-height:1.6;font-style:italic}
.pladd{width:100%;background:var(--surface);border:1px solid var(--sand);color:var(--forest);padding:13px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px}
.pladd:hover{border-color:var(--amber)}
.pltotal{background:linear-gradient(180deg,#fff,#faf3e6);border:1px solid var(--sand);border-radius:16px;padding:15px 18px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 22px rgba(168,134,78,.14)}
.pltotal .pk{font-size:21px;font-weight:700;color:var(--amber-deep)}
.pltotal .macros{font-size:12px;color:var(--txt2);text-align:right;line-height:1.5}
.savechk{display:flex;align-items:center;gap:12px;padding:14px 0;cursor:pointer;font-size:14px;color:var(--forest)}
.savechk .box{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--sand);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;transition:.15s;flex-shrink:0}
.savechk .box.on{background:var(--grad-amber);border-color:transparent}

/* ONBOARDING */
.onb{max-width:440px;margin:0 auto;padding:0 20px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
.onb-inner{padding:30px 0}
.onb .step-lbl{font-size:10px;font-weight:700;letter-spacing:.18em;color:var(--amber);text-transform:uppercase;margin-bottom:10px}
.onb h2{font-size:24px;font-weight:600;letter-spacing:-.02em;color:var(--forest);margin-bottom:6px}
.onb h2 em{font-style:italic;color:var(--amber)}
.onb .sub{font-size:13px;color:var(--txt2);margin-bottom:24px;line-height:1.5}
.onb .sub em{font-style:italic;color:var(--taupe-deep)}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--surface);border:1.5px solid var(--sand);border-radius:16px;padding:15px 17px;cursor:pointer;transition:.15s;text-align:left}
.opt:hover{border-color:var(--amber)}
.opt.sel{border-color:var(--amber);background:linear-gradient(180deg,#fff,#faf6ef)}
.opt .ot{font-size:14.5px;font-weight:600;color:var(--forest)}
.opt .od{font-size:11.5px;color:var(--txt2);margin-top:3px;line-height:1.4}
.onb-input{width:100%;background:var(--warm);border:1.5px solid transparent;border-radius:14px;padding:15px 16px;color:var(--forest);font-size:17px;outline:none;text-align:center;font-weight:600}
.onb-input:focus{border-color:var(--amber);background:#fff}
.onb-row{display:flex;gap:10px}
.onb-field{flex:1}
.onb-field label{display:block;font-size:11px;color:var(--taupe-deep);margin-bottom:6px;font-weight:600;text-align:center}
.onb-next{width:100%;padding:15px;background:var(--forest);color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;letter-spacing:.02em;cursor:pointer;margin-top:22px;transition:.15s}
.onb-next:hover{background:var(--moss)}.onb-next:disabled{opacity:.35}
.onb-skip{width:100%;background:none;border:none;color:var(--taupe);padding:12px;margin-top:6px;font-size:12.5px;cursor:pointer}
.onb-opt-tag{font-size:10px;color:var(--amber);font-style:italic;margin-left:6px}
.onb-progress{display:flex;gap:5px;margin-bottom:28px}
.onb-dot{flex:1;height:3px;border-radius:2px;background:var(--sand)}
.onb-dot.on{background:var(--grad-amber)}
.onb-result{text-align:center}
.onb-result .kcal-big{font-size:46px;font-weight:700;color:var(--forest);letter-spacing:-.03em;margin:8px 0}
.onb-result .kcal-big em{font-style:italic;color:var(--amber);font-size:20px;font-weight:400}
.onb-macros-preview{display:flex;gap:10px;margin:22px 0}
.onb-macro{flex:1;background:var(--surface);border:1px solid var(--sand);border-radius:14px;padding:14px 8px;box-shadow:var(--shadow-sm)}
.onb-macro .mv{font-size:19px;font-weight:700;color:var(--amber-deep)}
.onb-macro .ml{font-size:10px;color:var(--txt2);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.onb-note{font-size:11.5px;color:var(--txt2);font-style:italic;line-height:1.5;margin-top:8px;padding:12px 14px;background:var(--warm);border-radius:12px}
.hidden{display:none!important}

</style>
</head>
<body>
<div class="onb" id="onb"><div class="onb-inner" id="onb-inner"></div></div>

<div class="wrap hidden" id="app">
<div class="top"><div class="logo">Healthy Space Club</div><h1>Tu <em>día</em></h1></div>
<div class="modeswitch"><button class="on">Calculadora</button><button onclick="alert('El modo Plan del día lo armamos en el siguiente paso')">Plan del día</button></div>
<div class="goalcard">
<div class="lbl">Meta de hoy</div>
<div class="kcalrow"><div class="big"><span id="kcal">0</span> <small>/ <span id="kgoal">1800</span> kcal</small></div><div class="goal" id="krest">faltan 1800</div></div>
<div class="bar"><div class="brow"><span class="nm">Proteína</span><span class="vl"><span id="pv">0</span> / <span id="pg">110</span> g</span></div><div class="track"><div class="fill" id="pf"></div></div></div>
<div class="bar"><div class="brow"><span class="nm">Carbos</span><span class="vl"><span id="cv">0</span> / <span id="cg">200</span> g</span></div><div class="track"><div class="fill" id="cf"></div></div></div>
<div class="bar"><div class="brow"><span class="nm">Grasa</span><span class="vl"><span id="fv">0</span> / <span id="fg">55</span> g</span></div><div class="track"><div class="fill" id="ff"></div></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:11px;border-top:1px solid rgba(246,242,234,.12)"><span style="font-size:11px;color:rgba(246,242,234,.6)">Fibra</span><span style="font-size:11px;color:rgba(246,242,234,.85);font-weight:500"><span id="fibv">0</span> / <span id="fibg">25</span> g</span></div>
</div>
<div id="meals"></div>
</div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<script>

// ===== ONBOARDING =====
const OB={sexo:null,edad:null,peso:null,estatura:null,actividad:null,objetivo:null,embarazo:null,grasa:null,meta:null};
const ACT=[
 {id:'Sedentaria',f:1.2,t:'Sedentaria',d:'Poco o nada de ejercicio. Trabajo de escritorio, mayormente sentada.'},
 {id:'Ligera',f:1.375,t:'Ligera',d:'Ejercicio ligero 1–3 días por semana. Caminatas, algo de movimiento.'},
 {id:'Moderada',f:1.55,t:'Moderada',d:'Ejercicio 3–5 días por semana. Gym o deporte regular.'},
 {id:'Alta',f:1.725,t:'Alta',d:'Ejercicio intenso 6–7 días por semana. Entrenas casi diario.'},
 {id:'Atleta',f:1.9,t:'Atleta',d:'Entrenas muy fuerte, 2 veces al día, o trabajo físico pesado.'},
];
const OBJ=[
 {id:'Bajar grasa',t:'Bajar grasa',d:'Perder grasa cuidando tu músculo.'},
 {id:'Mantener',t:'Bienestar / mantener',d:'Comer sano y mantenerte.'},
 {id:'Recomposición',t:'Recomposición',d:'Bajar grasa y tonificar a la vez.'},
 {id:'Ganar músculo',t:'Ganar músculo',d:'Construir masa muscular.'},
];
let obStep=0;
const OB_STEPS=['sexo','datos','actividad','objetivo','embarazo','opcionales','resultado'];
function obDot(){let n=OB_STEPS.length;let s='<div class="onb-progress">';for(let i=0;i<n;i++)s+=`<div class="onb-dot ${i<=obStep?'on':''}"></div>`;return s+'</div>'}
const $o=id=>document.getElementById(id);
function renderOnb(){
 const step=OB_STEPS[obStep];const I=$o('onb-inner');
 // saltar embarazo si es hombre
 if(step==='embarazo' && OB.sexo==='Hombre'){obStep++;return renderOnb()}
 if(step==='sexo'){
  I.innerHTML=obDot()+`<div class="step-lbl">Paso 1</div><h2>¿Cuál es tu <em>sexo</em>?</h2><div class="sub">Lo usamos para calcular tus necesidades con precisión.</div><div class="opts"><button class="opt" onclick="pickSexo('Mujer')"><div class="ot">Mujer</div></button><button class="opt" onclick="pickSexo('Hombre')"><div class="ot">Hombre</div></button></div>`;
 }else if(step==='datos'){
  I.innerHTML=obDot()+`<div class="step-lbl">Paso 2</div><h2>Tus <em>datos</em></h2><div class="sub">Para calcular tu metabolismo.</div>
  <div class="onb-row"><div class="onb-field"><label>Edad</label><input class="onb-input" id="i-edad" type="number" inputmode="numeric" value="${OB.edad||''}" placeholder="28"></div><div class="onb-field"><label>Peso (kg)</label><input class="onb-input" id="i-peso" type="number" inputmode="decimal" value="${OB.peso||''}" placeholder="65"></div><div class="onb-field"><label>Estatura (cm)</label><input class="onb-input" id="i-est" type="number" inputmode="numeric" value="${OB.estatura||''}" placeholder="165"></div></div>
  <button class="onb-next" onclick="saveDatos()">Continuar</button>`;
 }else if(step==='actividad'){
  I.innerHTML=obDot()+`<div class="step-lbl">Paso 3</div><h2>Tu <em>actividad</em></h2><div class="sub">Piensa en tu semana completa, <em>no solo el gym</em>.</div><div class="opts">${ACT.map(a=>`<button class="opt" onclick="pickAct('${a.id}')"><div class="ot">${a.t}</div><div class="od">${a.d}</div></button>`).join('')}</div>`;
 }else if(step==='objetivo'){
  I.innerHTML=obDot()+`<div class="step-lbl">Paso 4</div><h2>Tu <em>objetivo</em></h2><div class="sub">¿Qué quieres lograr?</div><div class="opts">${OBJ.map(o=>`<button class="opt" onclick="pickObj('${o.id}')"><div class="ot">${o.t}</div><div class="od">${o.d}</div></button>`).join('')}</div>`;
 }else if(step==='embarazo'){
  I.innerHTML=obDot()+`<div class="step-lbl">Paso 5</div><h2>¿Estás <em>embarazada</em> o en lactancia?</h2><div class="sub">Es importante para cuidar tu salud y la de tu bebé.</div><div class="opts"><button class="opt" onclick="pickEmb(true)"><div class="ot">Sí</div></button><button class="opt" onclick="pickEmb(false)"><div class="ot">No</div></button></div>`;
 }else if(step==='opcionales'){
  I.innerHTML=obDot()+`<div class="step-lbl">Paso 6 · opcional</div><h2>Datos <em>extra</em> <span class="onb-opt-tag">si los sabes</span></h2><div class="sub">Nos ayudan a afinar tu plan, pero puedes saltarlos.</div>
  <div class="onb-row"><div class="onb-field"><label>% grasa corporal</label><input class="onb-input" id="i-grasa" type="number" inputmode="decimal" value="${OB.grasa||''}" placeholder="—"></div><div class="onb-field"><label>Peso meta (kg)</label><input class="onb-input" id="i-meta" type="number" inputmode="decimal" value="${OB.meta||''}" placeholder="—"></div></div>
  <button class="onb-next" onclick="saveOpc()">Continuar</button><button class="onb-skip" onclick="skipOpc()">Saltar este paso</button>`;
 }else if(step==='resultado'){
  const r=calcPlan();
  I.innerHTML=obDot()+`<div class="onb-result"><div class="step-lbl">Tu plan personalizado</div><h2>Tu meta <em>diaria</em></h2><div class="kcal-big">${r.kcal} <em>kcal</em></div>
  <div class="onb-macros-preview"><div class="onb-macro"><div class="mv">${r.prot}g</div><div class="ml">Proteína</div></div><div class="onb-macro"><div class="mv">${r.carbs}g</div><div class="ml">Carbos</div></div><div class="onb-macro"><div class="mv">${r.grasa}g</div><div class="ml">Grasa</div></div><div class="onb-macro"><div class="mv">${r.fibra}g</div><div class="ml">Fibra</div></div></div>
  ${r.aviso?`<div class="onb-note">${r.aviso}</div>`:''}${r.metaAviso?`<div class="onb-note" style="border-left:3px solid var(--amber)">${r.metaAviso}</div>`:''}${r.tiempoAviso?`<div class="onb-note">${r.tiempoAviso}</div>`:''}
  <button class="onb-next" onclick="startApp()">Empezar</button></div>`;
 }
}
function pickSexo(v){OB.sexo=v;obStep++;renderOnb()}
function saveDatos(){const e=+$o('i-edad').value,p=+$o('i-peso').value,es=+$o('i-est').value;
 if(!e||!p||!es){alert('Completa los tres datos');return}
 if(e<15||e>100){alert('Revisa tu edad (15-100 años).');return}
 if(p<30||p>300){alert('Revisa tu peso (30-300 kg).');return}
 if(es<120||es>220){alert('Revisa tu estatura (120-220 cm).');return}
 OB.edad=e;OB.peso=p;OB.estatura=es;obStep++;renderOnb()}

function calcPlan(){
 const {sexo,edad,peso,estatura,actividad,objetivo,embarazo,grasa}=OB;
 // BMR: Katch-McArdle si hay % grasa, si no Mifflin-St Jeor
 let bmr;
 if(grasa){const lbm=peso*(1-grasa/100);bmr=370+21.6*lbm}
 else{bmr=10*peso+6.25*estatura-5*edad+(sexo==='Hombre'?5:-161)}
 bmr=Math.round(bmr);
 const fact=(ACT.find(a=>a.id===actividad)||{f:1.375}).f;
 const tdee=Math.round(bmr*fact);
 // menor de edad o embarazo => sin deficit (modo bienestar)
 const menor=edad<18;
 // IMC actual para detectar bajo peso
 const hMact=estatura/100;const imcActual=peso/(hMact*hMact);
 const bajoPeso=imcActual<18.5;
 const quiereBajar=(objetivo==='Bajar grasa'||objetivo==='Recomposición');
 // bajo peso + querer bajar = riesgo => modo bienestar
 const riesgoBajoPeso=bajoPeso&&quiereBajar;
 const bloqueoDeficit=menor||embarazo||riesgoBajoPeso;
 // objetivo -> % ajuste
 let target=tdee;let obj=objetivo;
 if(bloqueoDeficit && (objetivo==='Bajar grasa'||objetivo==='Recomposición')){obj='Mantener'}
 if(obj==='Bajar grasa')target=tdee*0.80;
 else if(obj==='Recomposición')target=tdee*0.90;
 else if(obj==='Ganar músculo')target=tdee*1.12;
 // piso de seguridad: max(target, piso_sexo, bmr)
 const piso=sexo==='Hombre'?1500:1200;
 let kcal=Math.max(target,piso,bmr);
 let topado=kcal>target+5;
 kcal=Math.round(kcal);
 // proteina segun objetivo + actividad
 const gkgTable={'Bajar grasa':[2.0,2.2,2.4],'Mantener':[1.6,1.8,2.0],'Recomposición':[1.8,2.0,2.2],'Ganar músculo':[1.8,2.0,2.2]};
 const actIdx=(['Sedentaria','Ligera'].includes(actividad))?0:(actividad==='Moderada'?1:2);
 let gkg=(gkgTable[obj]||[1.4,1.6,1.8])[actIdx];
 if(gkg>2.4)gkg=2.4;
 const prot=Math.round(peso*gkg);
 // grasa: 25% kcal, piso 0.6 g/kg
 let grasaG=Math.max(kcal*0.25/9, peso*0.6);grasaG=Math.round(grasaG);
 // carbos: resto
 const kcalProt=prot*4, kcalGrasa=grasaG*9;
 let carbs=Math.round(Math.max(130,(kcal-kcalProt-kcalGrasa)/4));
 // fibra: 14g/1000kcal
 const fibra=Math.round(kcal/1000*14);
 // aviso principal
 let aviso='';
 if(menor)aviso='Como eres menor de 18, tu plan es de bienestar (sin restricción calórica). Para objetivos de composición corporal, consulta a un profesional.';
 else if(embarazo)aviso='En embarazo o lactancia no recomendamos déficit. Tu plan es de mantenimiento. Consulta a tu profesional de salud.';
 else if(riesgoBajoPeso)aviso='Ajustamos tu plan a modo bienestar. Para objetivos más específicos, un especialista puede ayudarte mejor.';
 else if(topado)aviso=`Ajustamos tu meta a ${kcal} kcal — bajar más no es seguro sin acompañamiento profesional.`;
 // validacion del PESO META (IMC + metas por etapas + contexto de % grasa)
 let metaAviso='';
 if(OB.meta && estatura){
  const hM=estatura/100;
  const imcMeta=OB.meta/(hM*hM);
  const pctCambio=Math.abs(OB.meta-peso)/peso*100;
  const subiendo=OB.meta>peso;
  // umbrales ACE de % grasa saludable/atletico
  const grasaBaja = grasa && (sexo==='Hombre' ? grasa<18 : grasa<25); // rango atleta/fitness
  const grasaAlta = grasa && (sexo==='Hombre' ? grasa>=25 : grasa>=32); // obeso ACE
  if(imcMeta<18.5 && !subiendo){
   metaAviso='Tu peso meta queda por debajo de un peso saludable para tu estatura. Te sugerimos una meta más segura, o consultar a un profesional de salud.';
  } else if(subiendo && imcMeta>=25){
   // quiere SUBIR y el IMC meta sale alto: revisar si es musculo
   if(grasaBaja){
    metaAviso='Tu meta te da un IMC alto, pero como tu porcentaje de grasa es bajo, eso es músculo, no grasa. Vas bien — el IMC no aplica para cuerpos musculosos.';
   } else if(!grasa){
    metaAviso='Tu meta te da un IMC alto. Ojo: el IMC no distingue músculo de grasa. Si buscas ganar músculo y entrenas fuerte, es normal e ignóralo. Si no, considera tu composición corporal.';
   } else if(grasaAlta){
    metaAviso='Para ganar músculo, cuida que el aumento sea gradual: sube despacio para ganar músculo y no grasa de más.';
   }
  } else if(pctCambio>10 && !subiendo && !grasaBaja){
   const etapa=Math.round(peso*0.92);
   metaAviso=`Tu meta es alcanzable, pero está lejos. Vamos por partes: tu primer objetivo será llegar a ~${etapa} kg (bajar 5-8%). Cuando lo logres, seguimos con el siguiente. Es más sano y sostenible.`;
  }
 }
 // tiempo estimado a un ritmo seguro (0.5-1% peso/semana)
 let tiempoAviso='';
 if(OB.meta && OB.meta<peso && !bloqueoDeficit){
  const kgBajar=peso-OB.meta;
  const semMax=Math.ceil(kgBajar/(peso*0.01)); // ritmo mas rapido (1%/sem)
  const semMin=Math.ceil(kgBajar/(peso*0.005)); // ritmo mas lento (0.5%/sem)
  const mesesMax=Math.round(semMin/4.3),mesesMin=Math.round(semMax/4.3);
  if(mesesMin>=1) tiempoAviso=`A un ritmo saludable, llegar a tu meta toma aprox. ${mesesMin}-${mesesMax} ${mesesMax===1?'mes':'meses'}. Lo sano toma tiempo, y así se mantiene.`;
 }
 return {kcal,prot,carbs,grasa:grasaG,fibra,bmr,tdee,aviso,metaAviso,tiempoAviso};
}
function startApp(){
 const r=calcPlan();
 META.k=r.kcal;META.p=r.prot;META.c=r.carbs;META.f=r.grasa;META.fib=r.fibra;
 $o('onb').classList.add('hidden');
 $o('app').classList.remove('hidden');
 $o('kgoal').textContent=META.k;$o('pg').textContent=META.p;$o('cg').textContent=META.c;$o('fg').textContent=META.f;
 if($o('fibg'))$o('fibg').textContent=META.fib;
 update();
}

function renderPlato(){
 let k=0,p=0,c=0,f=0,fib=0;platoIngs.forEach(d=>{k+=d.k;p+=d.p;c+=d.c;f+=d.f;fib+=(d.fib||0)});
 const ings=platoIngs.length?platoIngs.map((d,i)=>`<div class="pling"><div class="info"><div class="n">${d.nombre}</div><div class="m">${qtyLabel(d)}</div></div><div class="kc">${Math.round(d.k)}</div><button class="del" onclick="delPlatoIng(${i})">×</button></div>`).join(''):'<div class="plempty">Aún no agregas alimentos.<br>Toca "Agregar alimento" para empezar.</div>';
 $('sheet').innerHTML=`<div class="stitle">Armar platillo · ${MEALS.find(m=>m.id===curMeal).nm}</div><input class="nameinput" id="pname" placeholder="Nombre del platillo (ej. Mis chilaquiles)" value="${platoNombre}"><div class="plings">${ings}</div><button class="pladd" onclick="platoAddFood()">+ Agregar alimento</button><div class="pltotal"><div><div style="font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:.16em;margin-bottom:4px;font-weight:700">Total del platillo</div><div class="pk">${Math.round(k)} kcal</div></div><div class="macros">P ${p.toFixed(1)}<br>C ${c.toFixed(1)}<br>G ${f.toFixed(1)}</div></div><div class="savechk" onclick="toggleSave()"><div class="box ${platoSave?'on':''}">${platoSave?'✓':''}</div><div>Guardar en Mis platillos<br><span style="font-size:11px;color:var(--txt2);font-style:italic">para reusarlo otro día</span></div></div><button class="addbtn" onclick="finishPlato()" ${platoIngs.length===0?'disabled':''}>Agregar a mi día</button><button class="cancel" onclick="closeM()">Cancelar</button>`;
 $('pname').addEventListener('input',e=>platoNombre=e.target.value);
}
function toggleSave(){platoSave=!platoSave;renderPlato()}
function platoAddFood(){platoNombre=$('pname').value;targetPlato=true;$('sheet').innerHTML=`<div class="stitle">Agregar al platillo</div><div class="search"><input id="q" placeholder="Busca un alimento..." autocomplete="off"></div><div class="results" id="res"></div>`;setTimeout(()=>$('q').focus(),100);$('q').addEventListener('input',e=>{const v=e.target.value.toLowerCase().trim();if(v.length<2){$('res').innerHTML='';return}const m=FOODS.filter(f=>f.nombre.toLowerCase().includes(v)).slice(0,10);$('res').innerHTML=m.length?m.map(f=>`<div class="ritem" onclick="openFood('${f.id}')"><div class="nm">${f.nombre}</div><div class="mt">${cap(f.medida)} · ${Math.round(f.k/(f.g1*f.porc)*f.g1)} kcal por ${f.medida==='gramos'?'100 g':'1 '+f.medida}</div></div>`).join(''):'<div class="ritem"><div class="nm">Sin resultados</div></div>'})}
function backToPlato(){targetPlato=null;renderPlato()}
function delPlatoIng(i){platoIngs.splice(i,1);renderPlato()}
function finishPlato(){const nombre=($('pname')?$('pname').value:platoNombre)||'Mi platillo';let k=0,p=0,c=0,f=0,fib=0;platoIngs.forEach(d=>{k+=d.k;p+=d.p;c+=d.c;f+=d.f;fib+=(d.fib||0)});const plato={tipo:'platillo',nombre,ings:JSON.parse(JSON.stringify(platoIngs)),k,p,c,f,open:false};day[curMeal].push(plato);if(platoSave){saved.push({id:'sv'+Date.now(),nombre,ings:plato.ings,k,p,c,f})}closeM();update()}
function delItem(meal,i,ev){if(ev)ev.stopPropagation();day[meal].splice(i,1);update()}
function closeM(){$('modal').classList.remove('show')}
function update(){let k=0,p=0,c=0,f=0,fib=0;Object.values(day).forEach(arr=>arr.forEach(d=>{k+=d.k;p+=d.p;c+=d.c;f+=d.f;fib+=(d.fib||0)}));$('kcal').textContent=Math.round(k);const rest=META.k-k;$('krest').textContent=rest>0?`faltan ${Math.round(rest)}`:`+${Math.round(-rest)} de más`;$('pv').textContent=p.toFixed(0);$('cv').textContent=c.toFixed(0);$('fv').textContent=f.toFixed(0);$('pf').style.width=Math.min(100,p/META.p*100)+'%';$('cf').style.width=Math.min(100,c/META.c*100)+'%';$('ff').style.width=Math.min(100,f/META.f*100)+'%';if($('fibv'))$('fibv').textContent=Math.round(fib);renderMeals()}
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeM()});
renderOnb();
</script>
</body>
</html>
